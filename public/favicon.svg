<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Scales of Justice (Emoji Style - Simplified) -->
  <g transform="translate(50, 50)">
    <!-- Base/Stand -->
    <rect x="-2.5" y="28" width="5" height="22" fill="#1e40af" rx="1"/>
    
    <!-- Central Column -->
    <rect x="-2" y="12" width="4" height="20" fill="#1e40af" rx="1"/>
    
    <!-- Top Bar -->
    <rect x="-20" y="12" width="40" height="3" fill="#1e40af" rx="1.5"/>
    
    <!-- Left Scale (emoji style - rounded and simple) -->
    <g transform="translate(-10, 12)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="0" cy="16" r="6" fill="#3b82f6" opacity="0.2"/>
      <circle cx="0" cy="16" r="5.5" fill="none" stroke="#1e40af" stroke-width="2"/>
    </g>
    
    <!-- Right Scale (emoji style - rounded and simple) -->
    <g transform="translate(10, 12)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="0" cy="16" r="6" fill="#3b82f6" opacity="0.2"/>
      <circle cx="0" cy="16" r="5.5" fill="none" stroke="#1e40af" stroke-width="2"/>
    </g>
  </g>
</svg>
