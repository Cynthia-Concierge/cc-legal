<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle for better visibility -->
  <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Scales of Justice -->
  <g transform="translate(50, 50)">
    <!-- Base/Stand -->
    <rect x="-4" y="32" width="8" height="18" fill="url(#grad)" rx="2"/>
    
    <!-- Central Column -->
    <rect x="-3" y="18" width="6" height="18" fill="url(#grad)" rx="1"/>
    
    <!-- Top Bar -->
    <rect x="-28" y="18" width="56" height="4" fill="url(#grad)" rx="2"/>
    
    <!-- Left Scale -->
    <g transform="translate(-18, 18)">
      <line x1="0" y1="0" x2="0" y2="18" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="0" cy="22" rx="10" ry="4" fill="#3b82f6" opacity="0.2"/>
      <ellipse cx="0" cy="22" rx="9" ry="3.5" fill="none" stroke="#1e40af" stroke-width="2"/>
      <circle cx="-4" cy="20" r="2.5" fill="#1e40af"/>
      <circle cx="4" cy="20" r="2.5" fill="#1e40af"/>
    </g>
    
    <!-- Right Scale -->
    <g transform="translate(18, 18)">
      <line x1="0" y1="0" x2="0" y2="18" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="0" cy="22" rx="10" ry="4" fill="#3b82f6" opacity="0.2"/>
      <ellipse cx="0" cy="22" rx="9" ry="3.5" fill="none" stroke="#1e40af" stroke-width="2"/>
      <circle cx="-4" cy="20" r="2.5" fill="#1e40af"/>
      <circle cx="4" cy="20" r="2.5" fill="#1e40af"/>
    </g>
  </g>
</svg>

